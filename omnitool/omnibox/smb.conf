[global]
    workgroup = WORKGROUP
    server string = OmniBox Share
    netbios name = OMNIBOX
    security = user
    map to guest = Bad User
    interfaces = eth0 lo
    bind interfaces only = no
    server min protocol = NT1

    # disable printing services
    load printers = no
    printing = bsd
    printcap name = /dev/null
    disable spoolss = yes

[Data]
    path = /run/import
    comment = Shared
    browseable = yes
    read only = no
    guest ok = yes
    force user = root
