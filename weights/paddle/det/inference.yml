Global:
  model_name: en_PP-OCRv3_det_infer # Oder dein spezifischer Modellname
  model_type: det
  algorithm: DB

PreProcess:
  transform_ops:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - DetResizeForTest:
        limit_side_len: 960
        limit_type: max
    - NormalizeImage:
        scale: 0.00392156862745098 # Entspricht 1./255.
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
        order: hwc
    - ToCHWImage: null

PostProcess:
  name: DBPostProcess
  thresh: 0.3
  box_thresh: 0.6
  max_candidates: 1000
  unclip_ratio: 1.0 # WICHTIG: Auf 1.0 gesetzt, um das "Wandern" nach unten zu stoppen